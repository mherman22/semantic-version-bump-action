name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+$' | head -2 | tail -1 || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Generating changelog from $PREVIOUS_TAG to ${{ github.ref_name }}..."

          CHANGELOG=$(git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" $PREVIOUS_TAG..${{ github.ref_name }} | head -50)

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release"
          fi

          cat >> "$GITHUB_OUTPUT" << EOF
          changelog<<CHANGELOG_EOF
          ## What's Changed

          $CHANGELOG

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ github.ref_name }}
          CHANGELOG_EOF
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Semantic Version Bump ${{ github.ref_name }}
          make_latest: true
          body: |
            # 🚀 Semantic Version Bump Action ${{ github.ref_name }}

            A GitHub Action for semantic version bumping in Maven and Node.js projects.

            ${{ steps.changelog.outputs.changelog }}

            ## 📦 Usage

            ```yaml
            - name: Bump version
              uses: mherman22/semantic-version-bump-action@${{ github.ref_name }}
              with:
                version-type: 'minor'
                release-stage: 'beta'
            ```

            ## 🔗 Links

            - 📚 [Documentation](https://github.com/mherman22/semantic-version-bump-action#readme)
            - 🛠️ [Marketplace](https://github.com/marketplace/actions/semantic-version-bump)
            - 🐛 [Issues](https://github.com/mherman22/semantic-version-bump-action/issues)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Marketplace Publishing
        run: |
          echo "🎉 Release ${{ github.ref_name }} created successfully!"
          echo ""
          echo "📦 GitHub will automatically publish this action to the marketplace because:"
          echo "  ✅ Repository contains action.yml"
          echo "  ✅ Release was created (not just tagged)"
          echo "  ✅ Repository is public"
          echo ""
          echo "🔗 Action will be available at:"
          echo "   https://github.com/marketplace/actions/semantic-version-bump"
          echo ""
          echo "⏱️ Marketplace indexing usually takes a few minutes..."